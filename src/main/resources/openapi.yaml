openapi: 3.0.3
info:
  title: File Manager REST API
  version: 1.0.0
  description: |
    REST API for managing users, files, and their upload history.

    ## Entities

    - **User** — a person who uploads files
    - **File** — an uploaded file (name + path)
    - **Event** — a link between a User and a File; represents the fact that a user uploaded that file

    ## Authentication

    All endpoints require **HTTP Basic Auth**.

    | Username | Password |
    |----------|----------|
    | admin    | admin    |

    In Postman: `Authorization` tab → Type: `Basic Auth`.

    ## PUT vs PATCH

    - **PUT** — full replacement: you must send all required fields
    - **PATCH** — partial update: send only the fields you want to change; everything else stays as-is

    ## Delete rules

    - **DELETE /users/{id}** — deletes the user and all their events. Files are not affected.
    - **DELETE /files/{id}** — only allowed if the file has no events. If it does, returns `409`. Delete the events first, then the file.
    - **DELETE /events/{id}** — removes only the user-file link. Both the user and the file remain intact.

servers:
  - url: /REST_API

tags:
  - name: Users
    description: Create and manage users
  - name: Files
    description: Create and manage files
  - name: Events
    description: Manage links between users and files (upload history)

paths:

  # ─────────────── USERS ───────────────

  /users:
    get:
      summary: Get all users
      description: Returns a list of all users. Each user includes their full event history (which files they are linked to).
      tags: [Users]
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              example:
                - id: 1
                  name: Ivan
                  events:
                    - id: 1
                      file:
                        id: 1
                        name: report.pdf
                        filePath: /uploads/report.pdf
                - id: 2
                  name: Sergey
                  events: []
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create a new user
      description: Creates a user with the given name. Name must not be blank and must not exceed 100 characters.
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
            example:
              name: Ivan
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: 1
                name: Ivan
                events: []
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /users/{id}:
    get:
      summary: Get user by id
      description: Returns a single user by their id, including their full event history.
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: 1
                name: Ivan
                events:
                  - id: 1
                    file:
                      id: 1
                      name: report.pdf
                      filePath: /uploads/report.pdf
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Full update of a user
      description: |
        Replaces all user fields with the provided values.
        All required fields must be present in the request body.
        The user's events are not affected.
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
            example:
              name: Sergey
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: 1
                name: Sergey
                events:
                  - id: 1
                    file:
                      id: 1
                      name: report.pdf
                      filePath: /uploads/report.pdf
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      summary: Partial update of a user
      description: |
        Updates only the fields provided in the request body.
        Fields not included in the body are left unchanged.
        Example: send only `name` to rename the user without affecting anything else.
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPatchRequest'
            example:
              name: Sergey
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: 1
                name: Sergey
                events:
                  - id: 1
                    file:
                      id: 1
                      name: report.pdf
                      filePath: /uploads/report.pdf
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete user
      description: |
        Deletes the user by id.
        All events linked to this user are deleted automatically (cascade).
        Files are **not** affected — they exist independently.
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: User deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─────────────── FILES ───────────────

  /files:
    get:
      summary: Get all files
      description: Returns a list of all files in the system.
      tags: [Files]
      responses:
        '200':
          description: List of files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/File'
              example:
                - id: 1
                  name: report.pdf
                  filePath: /uploads/report.pdf
                - id: 2
                  name: photo.jpg
                  filePath: /uploads/photo.jpg
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create a new file
      description: |
        Registers a new file with a name and a path.
        Both fields are required and must not be blank.
        The file is not linked to any user until an Event is created.
      tags: [Files]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileRequest'
            example:
              name: report.pdf
              filePath: /uploads/report.pdf
      responses:
        '201':
          description: File created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/File'
              example:
                id: 1
                name: report.pdf
                filePath: /uploads/report.pdf
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /files/{id}:
    get:
      summary: Get file by id
      description: Returns a single file by its id.
      tags: [Files]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: File found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/File'
              example:
                id: 1
                name: report.pdf
                filePath: /uploads/report.pdf
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Full update of a file
      description: |
        Replaces all file fields with the provided values.
        Both `name` and `filePath` are required.
      tags: [Files]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileRequest'
            example:
              name: report_final.pdf
              filePath: /uploads/report_final.pdf
      responses:
        '200':
          description: File updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/File'
              example:
                id: 1
                name: report_final.pdf
                filePath: /uploads/report_final.pdf
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      summary: Partial update of a file
      description: |
        Updates only the fields provided in the request body.
        Example: send only `name` to rename the file without changing its path.
      tags: [Files]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilePatchRequest'
            example:
              name: report_final.pdf
      responses:
        '200':
          description: File updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/File'
              example:
                id: 1
                name: report_final.pdf
                filePath: /uploads/report.pdf
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete file
      description: |
        Deletes the file by id.

        **Important:** a file cannot be deleted if it has associated events (i.e. it is linked to one or more users).
        Returns `409 Conflict` in that case.

        To delete the file:
        1. Delete all events that reference this file (`DELETE /events/{id}`)
        2. Then delete the file
      tags: [Files]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: File deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: File deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: File has associated events and cannot be deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Cannot delete file 1: it has 2 associated event(s)"
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─────────────── EVENTS ───────────────

  /events:
    get:
      summary: Get all events
      description: Returns all events — every user-file link in the system.
      tags: [Events]
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
              example:
                - id: 1
                  user:
                    id: 1
                    name: Ivan
                  file:
                    id: 1
                    name: report.pdf
                    filePath: /uploads/report.pdf
                - id: 2
                  user:
                    id: 2
                    name: Sergey
                  file:
                    id: 1
                    name: report.pdf
                    filePath: /uploads/report.pdf
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create event (link user to file)
      description: |
        Creates a link between an existing user and an existing file.
        This represents a user uploading (or being associated with) a file.

        **Rules:**
        - Both `user.id` and `file.id` must reference existing entities
        - The same user-file combination can only exist once — returns `409` if it already exists
      tags: [Events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventRequest'
            example:
              user:
                id: 1
              file:
                id: 1
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
              example:
                id: 1
                user:
                  id: 1
                  name: Ivan
                file:
                  id: 1
                  name: report.pdf
                  filePath: /uploads/report.pdf
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: User or file not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "User not found with id: 99"
        '409':
          description: This user-file combination already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Event already exists for user 1 and file 1"
        '500':
          $ref: '#/components/responses/InternalServerError'

  /events/{id}:
    get:
      summary: Get event by id
      description: Returns a single event by its id, including the linked user and file.
      tags: [Events]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Event found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
              example:
                id: 1
                user:
                  id: 1
                  name: Ivan
                file:
                  id: 1
                  name: report.pdf
                  filePath: /uploads/report.pdf
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Full update of an event
      description: |
        Changes the user-file link of an existing event.
        Both `user.id` and `file.id` must be provided and must reference existing entities.
        The new user-file combination must not already exist as another event.
      tags: [Events]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventRequest'
            example:
              user:
                id: 2
              file:
                id: 2
      responses:
        '200':
          description: Event updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
              example:
                id: 1
                user:
                  id: 2
                  name: Sergey
                file:
                  id: 2
                  name: photo.jpg
                  filePath: /uploads/photo.jpg
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      summary: Partial update of an event
      description: |
        Updates only the provided fields of the event.
        You can change just the user, just the file, or both at once.
        The resulting user-file combination must not already exist as another event.
      tags: [Events]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventPatchRequest'
            example:
              file:
                id: 2
      responses:
        '200':
          description: Event updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
              example:
                id: 1
                user:
                  id: 1
                  name: Ivan
                file:
                  id: 2
                  name: photo.jpg
                  filePath: /uploads/photo.jpg
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete event
      description: |
        Removes the link between a user and a file.
        The user and the file themselves are **not** deleted.
        After deleting all events for a file, the file can then be deleted freely.
      tags: [Events]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Event deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Event deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /events/user/{userId}:
    get:
      summary: Get upload history for a user
      description: Returns all events for a specific user — every file they are linked to.
      tags: [Events]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: List of events for the user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
              example:
                - id: 1
                  user:
                    id: 1
                    name: Ivan
                  file:
                    id: 1
                    name: report.pdf
                    filePath: /uploads/report.pdf
                - id: 3
                  user:
                    id: 1
                    name: Ivan
                  file:
                    id: 2
                    name: photo.jpg
                    filePath: /uploads/photo.jpg
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
      example: 1

  responses:
    BadRequest:
      description: Validation error or invalid request body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Name must not be blank"
    Unauthorized:
      description: Missing or invalid Basic Auth credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Unauthorized"
    NotFound:
      description: Entity not found by the given id
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "User not found with id: 99"
    Conflict:
      description: This user-file combination already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Event already exists for user 1 and file 1"
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Internal server error"

  schemas:

    User:
      type: object
      description: A user with their full upload history
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Ivan
        events:
          type: array
          description: Files this user is linked to
          items:
            $ref: '#/components/schemas/EventSummary'

    UserSummary:
      type: object
      description: Minimal user reference — used inside Event responses to avoid circular nesting
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Ivan

    UserRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Ivan

    UserPatchRequest:
      type: object
      description: All fields are optional. Only the fields you send will be updated.
      properties:
        name:
          type: string
          example: Sergey

    File:
      type: object
      description: A registered file with its storage path
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: report.pdf
        filePath:
          type: string
          example: /uploads/report.pdf

    FileRequest:
      type: object
      required: [name, filePath]
      properties:
        name:
          type: string
          example: report.pdf
        filePath:
          type: string
          example: /uploads/report.pdf

    FilePatchRequest:
      type: object
      description: All fields are optional. Only the fields you send will be updated.
      properties:
        name:
          type: string
          example: report_final.pdf
        filePath:
          type: string
          example: /uploads/report_final.pdf

    Event:
      type: object
      description: A link between a user and a file (upload history record)
      properties:
        id:
          type: integer
          example: 1
        user:
          $ref: '#/components/schemas/UserSummary'
        file:
          $ref: '#/components/schemas/File'

    EventSummary:
      type: object
      description: Minimal event reference — used inside User responses (user already known, not repeated)
      properties:
        id:
          type: integer
          example: 1
        file:
          $ref: '#/components/schemas/File'

    EventRequest:
      type: object
      required: [user, file]
      properties:
        user:
          type: object
          required: [id]
          properties:
            id:
              type: integer
              example: 1
        file:
          type: object
          required: [id]
          properties:
            id:
              type: integer
              example: 1

    EventPatchRequest:
      type: object
      description: All fields are optional. Only the fields you send will be updated.
      properties:
        user:
          type: object
          properties:
            id:
              type: integer
              example: 1
        file:
          type: object
          properties:
            id:
              type: integer
              example: 2

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: User deleted successfully

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "User not found with id: 99"
