openapi: 3.0.3
info:
  title: File Manager REST API
  version: 2.0.0
  description: |
    REST API for managing users, files, and upload history.

    ## Entities

    - **User** — a person who uploads files
    - **File** — a real uploaded file stored on disk
    - **Event** — created automatically when a user uploads a file; represents upload history

    ## File Upload

    `POST /files` uses `multipart/form-data`. The file part must be named **`file`**.

    Optionally pass `X-User-Id` header to automatically create an **Event** linking the uploaded file to the specified user.

    ## File Download

    `GET /files/{id}/download` streams the actual file content from disk with the original `Content-Type`.

    ## PUT vs PATCH for files

    Only the file **name** can be updated. System fields (`filePath`, `contentType`, `size`) are managed automatically and cannot be changed.

    ## Delete rules

    - **DELETE /users/{id}** — deletes the user and all their events. Files are not affected.
    - **DELETE /files/{id}** — only allowed if the file has no events. Returns `409` otherwise. Also removes the physical file from disk.
    - **DELETE /events/{id}** — removes only the user-file link. Both the user and the file remain intact.

servers:
  - url: /REST_API/api/v1

tags:
  - name: Users
    description: Create and manage users
  - name: Files
    description: Upload and manage files
  - name: Events
    description: Upload history (user-file links)

paths:

  # ─────────────── USERS ───────────────

  /users:
    get:
      summary: Get all users
      description: Returns a list of all users including their upload history.
      tags: [Users]
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              example:
                - id: 1
                  name: Ivan
                  events:
                    - id: 1
                      file:
                        id: 1
                        name: report.pdf
                        filePath: D:/file_storage/uuid_report.pdf
                        contentType: application/pdf
                        size: 204800
                - id: 2
                  name: Sergey
                  events: []

        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Register a new user
      description: |
        Creates a user with the given name.
        - `name` must not be blank (max 255 characters)
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
            example:
              name: Ivan
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: 1
                name: Ivan
                events: []
        '400':
          $ref: '#/components/responses/BadRequest'

        '500':
          $ref: '#/components/responses/InternalServerError'

  /users/{id}:
    get:
      summary: Get user by id
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: 1
                name: Ivan
                events:
                  - id: 1
                    file:
                      id: 1
                      name: report.pdf
                      filePath: D:/file_storage/uuid_report.pdf
                      contentType: application/pdf
                      size: 204800

        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Full update of a user
      description: Updates the user's name. Password is not changed by this endpoint.
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
            example:
              name: Sergey
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: 1
                name: Sergey
                events: []
        '400':
          $ref: '#/components/responses/BadRequest'

        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      summary: Partial update of a user
      description: Updates only the fields provided. Currently only `name` is updatable.
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
            example:
              name: Sergey
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: 1
                name: Sergey
                events: []
        '400':
          $ref: '#/components/responses/BadRequest'

        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete user
      description: Deletes the user and all their events. Files are not affected.
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: User deleted successfully

        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─────────────── FILES ───────────────

  /files:
    get:
      summary: Get all files
      description: Returns metadata for all uploaded files.
      tags: [Files]
      responses:
        '200':
          description: List of files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/File'
              example:
                - id: 1
                  name: report.pdf
                  filePath: D:/file_storage/uuid_report.pdf
                  contentType: application/pdf
                  size: 204800
                - id: 2
                  name: photo.jpg
                  filePath: D:/file_storage/uuid_photo.jpg
                  contentType: image/jpeg
                  size: 51200

        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Upload a file
      description: |
        Uploads a real file to the server storage.

        - Request must be `multipart/form-data`
        - The file part must be named **`file`**
        - Max file size: **10 MB**
        - An **Event** is automatically created linking this file to the authenticated user

        The file is saved to `D:/file_storage/` with a UUID-prefixed name to avoid collisions.
      tags: [Files]
      parameters:
        - name: X-User-Id
          in: header
          required: false
          schema:
            type: integer
          description: If provided, an Event is created linking the file to this user
          example: 1
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload
      responses:
        '201':
          description: File uploaded successfully
          headers:
            Location:
              description: URL of the created file metadata
              schema:
                type: string
              example: /REST_API/files/1
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/File'
              example:
                id: 1
                name: report.pdf
                filePath: D:/file_storage/a1b2c3d4_report.pdf
                contentType: application/pdf
                size: 204800
        '400':
          $ref: '#/components/responses/BadRequest'

        '500':
          $ref: '#/components/responses/InternalServerError'

  /files/{id}:
    get:
      summary: Get file metadata by id
      description: Returns file metadata (name, path, contentType, size). Does not return the file content — use `/files/{id}/download` for that.
      tags: [Files]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: File found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/File'
              example:
                id: 1
                name: report.pdf
                filePath: D:/file_storage/uuid_report.pdf
                contentType: application/pdf
                size: 204800

        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Rename a file
      description: |
        Updates the file's display name.
        System fields (`filePath`, `contentType`, `size`) are managed automatically and cannot be changed.
      tags: [Files]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileUpdateRequest'
            example:
              name: report_final.pdf
      responses:
        '200':
          description: File updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/File'
              example:
                id: 1
                name: report_final.pdf
                filePath: D:/file_storage/uuid_report.pdf
                contentType: application/pdf
                size: 204800
        '400':
          $ref: '#/components/responses/BadRequest'

        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      summary: Partial update of a file
      description: Updates only the fields provided. Currently only `name` is updatable.
      tags: [Files]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileUpdateRequest'
            example:
              name: report_final.pdf
      responses:
        '200':
          description: File updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/File'
              example:
                id: 1
                name: report_final.pdf
                filePath: D:/file_storage/uuid_report.pdf
                contentType: application/pdf
                size: 204800
        '400':
          $ref: '#/components/responses/BadRequest'

        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete file
      description: |
        Deletes the file metadata from the database **and** removes the physical file from disk.

        **Important:** cannot be deleted if it has associated events. Returns `409` in that case.
        Delete all related events first, then delete the file.
      tags: [Files]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: File deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: File deleted successfully

        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: File has associated events and cannot be deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Cannot delete file 1: it has associated events"
        '500':
          $ref: '#/components/responses/InternalServerError'

  /files/{id}/download:
    get:
      summary: Download file content
      description: |
        Streams the actual file from disk.

        Returns the file with its original `Content-Type` and a `Content-Disposition: attachment` header
        so browsers will trigger a file download.
      tags: [Files]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: File content
          headers:
            Content-Disposition:
              description: Triggers browser download with original filename
              schema:
                type: string
              example: attachment; filename="report.pdf"
            Content-Length:
              schema:
                type: integer
              example: 204800
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─────────────── EVENTS ───────────────

  /events:
    get:
      summary: Get all events
      description: Returns all upload history records.
      tags: [Events]
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
              example:
                - id: 1
                  user:
                    id: 1
                    name: Ivan
                  file:
                    id: 1
                    name: report.pdf
                    filePath: D:/file_storage/uuid_report.pdf
                    contentType: application/pdf
                    size: 204800

        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Manually create an event
      description: |
        Manually links an existing user to an existing file.
        Normally events are created automatically on file upload — use this only if you need to link
        an existing file to another user.

        The same user-file combination can only exist once — returns `409` if it already exists.
      tags: [Events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventRequest'
            example:
              user:
                id: 1
              file:
                id: 1
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
              example:
                id: 1
                user:
                  id: 1
                  name: Ivan
                file:
                  id: 1
                  name: report.pdf
                  filePath: D:/file_storage/uuid_report.pdf
                  contentType: application/pdf
                  size: 204800
        '400':
          $ref: '#/components/responses/BadRequest'

        '404':
          description: User or file not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "User not found with id: 99"
        '409':
          description: This user-file combination already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Event already exists for user 1 and file 1"
        '500':
          $ref: '#/components/responses/InternalServerError'

  /events/{id}:
    get:
      summary: Get event by id
      tags: [Events]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Event found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
              example:
                id: 1
                user:
                  id: 1
                  name: Ivan
                file:
                  id: 1
                  name: report.pdf
                  filePath: D:/file_storage/uuid_report.pdf
                  contentType: application/pdf
                  size: 204800

        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Full update of an event
      description: Changes the user-file link. Both `user.id` and `file.id` must reference existing entities.
      tags: [Events]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventRequest'
            example:
              user:
                id: 2
              file:
                id: 2
      responses:
        '200':
          description: Event updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          $ref: '#/components/responses/BadRequest'

        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      summary: Partial update of an event
      description: Updates only the provided fields. You can change just the user, just the file, or both.
      tags: [Events]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventPatchRequest'
            example:
              file:
                id: 2
      responses:
        '200':
          description: Event updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          $ref: '#/components/responses/BadRequest'

        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete event
      description: Removes the user-file link. The user and file themselves are not deleted.
      tags: [Events]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Event deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Event deleted successfully

        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /events/user/{userId}:
    get:
      summary: Get upload history for a user
      description: Returns all events for a specific user — every file they have uploaded.
      tags: [Events]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: List of events for the user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
              example:
                - id: 1
                  user:
                    id: 1
                    name: Ivan
                  file:
                    id: 1
                    name: report.pdf
                    filePath: D:/file_storage/uuid_report.pdf
                    contentType: application/pdf
                    size: 204800

        '500':
          $ref: '#/components/responses/InternalServerError'

components:

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
      example: 1

  responses:
    BadRequest:
      description: Validation error or invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "User name must not be blank"
    NotFound:
      description: Entity not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "User not found with id: 99"
    Conflict:
      description: Duplicate user-file combination
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Event already exists for user 1 and file 1"
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Internal server error"

  schemas:

    User:
      type: object
      description: A user with their upload history. Password is never returned.
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Ivan
        events:
          type: array
          items:
            $ref: '#/components/schemas/EventSummary'

    UserSummary:
      type: object
      description: Minimal user reference used inside Event responses
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Ivan

    UserRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Ivan

    UserUpdateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Sergey

    File:
      type: object
      description: Uploaded file metadata
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: report.pdf
        filePath:
          type: string
          example: D:/file_storage/a1b2c3_report.pdf
          description: Absolute path on disk where the file is stored
        contentType:
          type: string
          example: application/pdf
          description: MIME type detected from the uploaded file
        size:
          type: integer
          format: int64
          example: 204800
          description: File size in bytes

    FileUpdateRequest:
      type: object
      required: [name]
      description: Only the display name can be updated. System fields are managed automatically.
      properties:
        name:
          type: string
          example: report_final.pdf

    Event:
      type: object
      description: Upload history record — links a user to a file
      properties:
        id:
          type: integer
          example: 1
        user:
          $ref: '#/components/schemas/UserSummary'
        file:
          $ref: '#/components/schemas/File'

    EventSummary:
      type: object
      description: Minimal event reference used inside User responses
      properties:
        id:
          type: integer
          example: 1
        file:
          $ref: '#/components/schemas/File'

    EventRequest:
      type: object
      required: [user, file]
      properties:
        user:
          type: object
          required: [id]
          properties:
            id:
              type: integer
              example: 1
        file:
          type: object
          required: [id]
          properties:
            id:
              type: integer
              example: 1

    EventPatchRequest:
      type: object
      description: All fields optional — send only what you want to change
      properties:
        user:
          type: object
          properties:
            id:
              type: integer
              example: 1
        file:
          type: object
          properties:
            id:
              type: integer
              example: 2

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: File deleted successfully

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "User not found with id: 99"
